version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: filmdex-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: filmdex-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/filmdex
      - TMDB_API_KEY=YOUR_TMDB_API_KEY
    restart: always

  frontend:
    build: ./frontend
    container_name: filmdex-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data: