<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure File Upload to S3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Upload File to S3</h1>
    <form id="uploadForm">
      <input type="file" id="fileInput" required>
      <button type="submit">Upload</button>
    </form>
    <div id="message"></div>
  </div>

  <script>
    const uploadForm = document.getElementById('uploadForm');
    const fileInput = document.getElementById('fileInput');
    const messageDiv = document.getElementById('message');

    // Replace this with your actual API Gateway endpoint
    const API_URL = "https://3qxmi3lyw9.execute-api.us-east-1.amazonaws.com/prod";

    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const file = fileInput.files[0];
      if (!file) {
        messageDiv.textContent = "Please select a file!";
        messageDiv.style.color = "red";
        return;
      }

      try {
        const formData = new FormData();
        formData.append("file", file);

        const response = await fetch(API_URL, {
          method: "POST",
          body: formData
        });

        if (!response.ok) throw new Error("Network response was not ok");

        const data = await response.json();
        messageDiv.textContent = `✅ Upload successful: ${file.name} saved to S3.`;
        messageDiv.style.color = "green";

      } catch (error) {
        console.error(error);
        messageDiv.textContent = `Upload failed: ${error.message}`;
        messageDiv.style.color = "red";
      }
    });
  </script>
</body>
</html>
