AWSTemplateFormatVersion: '2010-09-09'
Description: Event-Driven Architecture with Lambda, S3, and CloudWatch

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 KeyPair (optional if Lambda only)
    Default: dom

Resources:

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventDrivenLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - s3:GetObject
                Resource: "*"

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub event-driven-bucket-${AWS::AccountId}
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt S3TriggerLambda.Arn

  S3TriggerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: S3TriggerLambda
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          exports.handler = async (event) => {
              console.log("S3 Event received:", JSON.stringify(event, null, 2));
              return { statusCode: 200, body: "S3 Event processed" };
          };

  S3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref S3TriggerLambda
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt S3Bucket.Arn

  CloudWatchTriggerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: CloudWatchTriggerLambda
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              console.log("CloudWatch Event Triggered:", JSON.stringify(event));
              return { statusCode: 200, body: "CloudWatch Event processed" };
          };

  ScheduledEvent:
    Type: AWS::Events::Rule
    Properties:
      Name: CloudWatchScheduledEvent
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt CloudWatchTriggerLambda.Arn
          Id: LambdaTarget

  CloudWatchLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CloudWatchTriggerLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduledEvent.Arn

Outputs:
  S3BucketName:
    Description: "S3 Bucket Name"
    Value: !Ref S3Bucket
  S3LambdaName:
    Description: "S3 Trigger Lambda Name"
    Value: !Ref S3TriggerLambda
  CloudWatchLambdaName:
    Description: "CloudWatch Lambda Name"
    Value: !Ref CloudWatchTriggerLambda
